{% extends 'layouts/base.html' %}
{% load static %}
{% block content %}
  <!-- [ Main Content ] start -->
  <!-- profile header start -->
  <div class="user-profile user-card mb-4">
    <div class="card-header border-0 p-0 pb-0">
      <img src="{% static 'assets/images/user/cover.jpg' %}" alt="" class="img-fluid">
      <div class="overlay"></div>
    </div>
    <div class="card-body pt-0">
      <div class="user-about-block m-0">
        <div class="row">
          <div class="col-md-4 mt-md-4">
            <div class="col-md-6">
              <h5 class="mb-1">{{ worker.first_name }} {{ worker.last_name }}</h5>
              <p class="mb-2 text-muted">{{ worker.position }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- profile header end -->
  <!-- profile body start -->
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-body d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Personal details</h5>
          <a href="{% url 'task_manager:worker-update' pk=worker.id %}" class="btn btn-primary btn-sm rounded m-0 float-end">
            <i class="feather icon-edit"></i>
          </a>
        </div>
        <div class="card-body border-top pro-det-edit collapse show" id="pro-det-edit-1">
          <form>
            <div class="form-group row">
              <label class="col-sm-3 col-form-label font-weight-bolder">Username</label>
              <div class="col-sm-9">
                {{ worker.username}}
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-3 col-form-label font-weight-bolder">First Name</label>
              <div class="col-sm-9">
                {{ worker.first_name}}
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-3 col-form-label font-weight-bolder">Last Name</label>
              <div class="col-sm-9">
                {{ worker.last_name}}
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-3 col-form-label font-weight-bolder">Position</label>
              <div class="col-sm-9">
                {{ worker.position }}
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-3 col-form-label font-weight-bolder">Email</label>
              <div class="col-sm-9">
                {{ worker.email }}
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- profile body end -->
  <!-- [ Main Content ] end -->
{% endblock content %}
